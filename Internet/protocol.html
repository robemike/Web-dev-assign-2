<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protocol</title>
  </head>
  <body>
    <div
      style="
        max-width: 600px;
        margin: 0 auto;
        background-color: white;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      "
    >
      <h1
        style="
          color: #2c2c2c;
          border-bottom: 2px solid #e07b39;
          padding-bottom: 10px;
          text-align: center;
        "
      >
        Protocol
      </h1>
      <p style="line-height: 1.7">
        A common software standard/language that computers use to communicate
        over the Internet. Examples include HTTP, FTP, SMTP, TCP/IP.
      </p>
      <img
        src="../images/protocol.png"
        alt="Protocol illustration"
        style="
          display: block;
          margin: 20px auto;
          width: 400px;
          height: auto;
          border-radius: 6px;
          box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        "
      />
    </div>
  </body>
</html>
